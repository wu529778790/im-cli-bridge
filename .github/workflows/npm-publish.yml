name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_channel:
        description: 'Release channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta
          - rc
          - alpha
      version_bump:
        description: 'Base version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (build package without publishing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - name: Sync version from pushed tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Using version from tag: $VERSION"
          npm pkg set version="$VERSION"

      - name: Bump version for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          CHANNEL="${{ github.event.inputs.release_channel || 'stable' }}"
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          echo "Inputs: CHANNEL=$CHANNEL, BUMP=$BUMP"

          npm install --no-save semver

          cat > bump-version.cjs << 'NODEEOF'
          const { execSync } = require('child_process');
          const semver = require('semver');

          const channel = process.argv[2]; // stable | beta | rc | alpha
          const bump = process.argv[3];    // patch | minor | major

          function npmView(command, fallback) {
            try {
              const out = execSync(command, {
                encoding: 'utf8',
                shell: '/bin/bash',
                stdio: ['ignore', 'pipe', 'pipe'],
              }).trim();
              return out || fallback;
            } catch {
              return fallback;
            }
          }

          // 读取线上所有已发布版本，按 semver 解析
          const rawVersions = npmView(
            'npm view @wu529778790/open-im versions --json',
            '[]'
          );

          /** @type {string[]} */
          let versions;
          try {
            const parsed = JSON.parse(rawVersions);
            versions = Array.isArray(parsed) ? parsed.filter((v) => typeof v === 'string') : [];
          } catch {
            versions = [];
          }

          const validVersions = versions
            .map((v) => (semver.valid(v) ? v : null))
            .filter((v) => v !== null);

          // 所有稳定版（无 prerelease）
          const stableVersions = validVersions.filter((v) => !semver.prerelease(v));
          const stableLatest = stableVersions.length
            ? stableVersions.sort(semver.rcompare)[0]
            : '0.0.0';

          // 计算下一个稳定基线版本（不一定会直接发布，只是作为 beta/rc 的 base）
          const nextStableBase = semver.inc(stableLatest, bump);
          if (!nextStableBase) {
            throw new Error(`Failed to calculate next stable base from ${stableLatest} with bump ${bump}`);
          }

          if (channel === 'stable') {
            // 稳定渠道：直接在线上最新稳定版基础上 +1
            console.log(nextStableBase);
            process.exit(0);
          }

          // 非 stable 渠道：按对应的 prerelease 渠道继续 +1
          const channelVersions = validVersions.filter((v) => {
            const pre = semver.prerelease(v);
            return pre && pre[0] === channel;
          });

          if (channelVersions.length > 0) {
            // 线上已有该渠道的版本：在最新的渠道版本上做 prerelease +1
            const latestChannelVersion = channelVersions.sort(semver.rcompare)[0];
            const continued = semver.inc(latestChannelVersion, 'prerelease', channel);
            if (!continued) {
              throw new Error(`Failed to continue ${channel} prerelease from ${latestChannelVersion}`);
            }
            console.log(continued);
            process.exit(0);
          }

          // 该渠道还没有版本：从新的稳定基线起一个 x.y.z-channel.0
          console.log(`${nextStableBase}-${channel}.0`);
          NODEEOF

          VERSION="$(node bump-version.cjs "$CHANNEL" "$BUMP")"
          echo "Calculated release version: $VERSION"

          if [ -z "$VERSION" ]; then
            echo "ERROR: VERSION is empty!"
            exit 1
          fi

          npm pkg set version="$VERSION"

      - run: npm run build

      - run: npm test

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")

          echo "Preparing to publish version $VERSION to npm..."

          # 如果该版本已经存在于 npm，则直接跳过发布，避免 E403 覆盖错误
          EXISTING_VERSION=$(npm view @wu529778790/open-im@"$VERSION" version 2>/dev/null || echo "")
          if [ -n "$EXISTING_VERSION" ]; then
            echo "Version $VERSION is already published on npm (found: $EXISTING_VERSION). Skipping publish."
            exit 0
          fi

          CHANNEL="${{ github.event.inputs.release_channel || 'stable' }}"

          # Detect if version is a prerelease (contains -alpha, -beta, -rc)
          if [[ "$VERSION" =~ -alpha\.|-beta\.|-rc\. ]]; then
            # Extract prerelease channel from version (e.g., "beta" from "1.0.0-beta.5")
            VERSION_CHANNEL=$(echo "$VERSION" | sed -n 's/.*-\([^.]*\)\.[0-9]*/\1/p')
            echo "Publishing prerelease version $VERSION with npm tag $VERSION_CHANNEL"
            npm publish --access public --tag "$VERSION_CHANNEL"
          else
            echo "Publishing stable version $VERSION"
            npm publish --access public
          fi

      - name: Dry run (no publish)
        if: github.event.inputs.dry_run == 'true'
        run: npm pack
