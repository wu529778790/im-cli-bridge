name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (自动从 dev 分支发布 prerelease)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_tag:
        description: 'Prerelease tag (选择 prerelease 时生效)'
        required: false
        default: 'beta'
        type: choice
        options:
          - beta
          - rc
          - alpha
      dry_run:
        description: 'Dry run (不发布，仅打包)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm ci

      - name: Detect prerelease version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            # Extract prerelease tag (e.g., "beta" from "1.0.0-beta.1")
            TAG=$(echo "$VERSION" | sed -n 's/.*-\([a-zA-Z]*\).*/\1/p')
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "PRERELEASE_TAG=$TAG" >> $GITHUB_ENV
            echo "Detected prerelease version: $VERSION (tag: $TAG)"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "Detected stable version: $VERSION"
          fi

      - name: Bump version (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          TAG="${{ github.event.inputs.prerelease_tag || 'beta' }}"

          # 创建临时 Node 脚本
          cat > /tmp/bump-version.js << 'EOF'
          const { execSync } = require('child_process');
          try { var semver = require('semver'); } catch { null; }
          const bump = process.argv[1];
          const tag = process.argv[2];
          const isDev = process.argv[3] === 'true';
          const isPrerelease = isDev || bump === 'prerelease';

          function semverInc(version, type, preid) {
            const semver = require('semver');
            return semver.inc(version, type, preid);
          }

          if (!isPrerelease) {
            const npmVer = execSync('npm view @wu529778790/open-im version 2>/dev/null', { encoding: 'utf8' }).trim() || '0.0.0';
            const next = semverInc(npmVer, bump);
            console.log('VERSION=' + next);
            console.log('IS_PRERELEASE=false');
            console.log('PRERELEASE_TAG=');
            return;
          }

          try {
            const versions = JSON.parse(execSync('npm view @wu529778790/open-im versions --json', { encoding: 'utf8' }));
            const semver = require('semver');
            const npmVer = versions.sort(semver.compare).pop() || '0.0.0';
            console.error('Latest npm version:', npmVer);

            let next;
            const prerelease = semver.prerelease(npmVer);

            if (!prerelease || prerelease.length === 0) {
              const base = semverInc(npmVer, 'patch');
              next = `${base}-${tag}.0`;
            } else if (npmVer.includes(`-${tag}.`)) {
              next = semverInc(npmVer, 'prerelease', tag);
            } else {
              const base = npmVer.split('-')[0];
              next = `${base}-${tag}.0`;
            }

            console.log('VERSION=' + next);
            console.log('IS_PRERELEASE=true');
            console.log('PRERELEASE_TAG=' + tag);
          } catch (e) {
            console.error('Error:', e.message);
            console.log('VERSION=1.0.0-' + tag + '.0');
            console.log('IS_PRERELEASE=true');
            console.log('PRERELEASE_TAG=' + tag);
          }
          EOF

          # 执行脚本并解析结果
          RESULT=$(node /tmp/bump-version.js "$BUMP" "$TAG" "$([[ "${{ github.ref_name }}" == "dev" ]] && echo "true" || echo "false")" 2>&1)
          eval "$(echo "$RESULT" | grep '^VERSION\|^IS_PRERELEASE\|^PRERELEASE_TAG')"

          echo "Publishing version: $VERSION"
          npm pkg set version=$VERSION
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV
          echo "PRERELEASE_TAG=$PRERELEASE_TAG" >> $GITHUB_ENV

      - run: npm run build

      - run: npm test
        continue-on-error: true

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            npm publish --access public --tag=$PRERELEASE_TAG
          else
            npm publish --access public
          fi

      - name: Dry run (no publish)
        if: github.event.inputs.dry_run == 'true'
        run: npm pack
