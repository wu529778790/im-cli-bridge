name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_channel:
        description: 'Release channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta
          - rc
          - alpha
      version_bump:
        description: 'Base version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (build package without publishing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - name: Sync version from pushed tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Using version from tag: $VERSION"
          npm pkg set version="$VERSION"

      - name: Bump version for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          CHANNEL="${{ github.event.inputs.release_channel || 'stable' }}"
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          echo "Inputs: CHANNEL=$CHANNEL, BUMP=$BUMP"

          npm install --no-save semver

          cat > bump-version.cjs << 'NODEEOF'
          const { execSync } = require('child_process');
          const semver = require('semver');

          const channel = process.argv[2];
          const bump = process.argv[3];

          function npmView(command, fallback) {
            return execSync(
              `${command} 2>/dev/null || echo ${JSON.stringify(fallback)}`,
              { encoding: 'utf8', shell: '/bin/bash' }
            ).trim();
          }

          const latest = npmView(
            'npm view @wu529778790/open-im dist-tags.latest',
            '0.0.0'
          );

          const stableBase = semver.valid(latest) ? latest : '0.0.0';
          const nextStable = semver.inc(stableBase, bump);
          if (!nextStable) {
            throw new Error(`Failed to calculate next version from ${latest} with bump ${bump}`);
          }

          if (channel === 'stable') {
            console.log(nextStable);
            process.exit(0);
          }

          const channelTag = npmView(`npm view @wu529778790/open-im dist-tags.${channel}`, '');
          const currentChannelVersion = semver.valid(channelTag) ? channelTag : null;

          if (
            currentChannelVersion &&
            semver.prerelease(currentChannelVersion)?.[0] === channel &&
            semver.gte(currentChannelVersion, `${nextStable}-${channel}.0`)
          ) {
            const continued = semver.inc(currentChannelVersion, 'prerelease', channel);
            if (!continued) {
              throw new Error(`Failed to continue ${channel} prerelease from ${currentChannelVersion}`);
            }
            console.log(continued);
            process.exit(0);
          }

          console.log(`${nextStable}-${channel}.0`);
          NODEEOF

          VERSION="$(node bump-version.cjs "$CHANNEL" "$BUMP")"
          echo "Calculated release version: $VERSION"

          if [ -z "$VERSION" ]; then
            echo "ERROR: VERSION is empty!"
            exit 1
          fi

          npm pkg set version="$VERSION"

      - run: npm run build

      - run: npm test

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CHANNEL="${{ github.event.inputs.release_channel || 'stable' }}"

          # Detect if version is a prerelease (contains -alpha, -beta, -rc)
          if [[ "$VERSION" =~ -alpha\.|-beta\.|-rc\. ]]; then
            # Extract prerelease channel from version (e.g., "beta" from "1.0.0-beta.5")
            VERSION_CHANNEL=$(echo "$VERSION" | sed -n 's/.*-\([^.]*\)\.[0-9]*/\1/p')
            echo "Publishing prerelease version $VERSION with npm tag $VERSION_CHANNEL"
            npm publish --access public --tag "$VERSION_CHANNEL"
          else
            echo "Publishing stable version $VERSION"
            npm publish --access public
          fi

      - name: Dry run (no publish)
        if: github.event.inputs.dry_run == 'true'
        run: npm pack
