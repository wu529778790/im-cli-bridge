name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (自动从 dev 分支发布 prerelease)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_tag:
        description: 'Prerelease tag (选择 prerelease 时生效)'
        required: false
        default: 'beta'
        type: choice
        options:
          - beta
          - rc
          - alpha
      dry_run:
        description: 'Dry run (不发布，仅打包)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  pull-requests: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - name: Detect prerelease version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
            # Extract prerelease tag (e.g., "beta" from "1.0.0-beta.1")
            TAG=$(echo "$VERSION" | sed -n 's/.*-\([a-zA-Z]*\).*/\1/p')
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "PRERELEASE_TAG=$TAG" >> $GITHUB_ENV
            echo "Detected prerelease version: $VERSION (tag: $TAG)"
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "Detected stable version: $VERSION"
          fi

      - name: Bump version (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          TAG="${{ github.event.inputs.prerelease_tag || 'beta' }}"
          IS_DEV="$([[ "${{ github.ref_name }}" == "dev" ]] && echo "true" || echo "false")"

          echo "Inputs: BUMP=$BUMP, TAG=$TAG, IS_DEV=$IS_DEV"

          # 安装 semver（如果还没有）
          npm install --no-save semver

          # 创建 CommonJS 脚本（使用 .cjs 扩展名）
          cat > bump-version.cjs << 'NODEEOF'
          const { execSync } = require('child_process');
          const semver = require('semver');
          const bump = process.argv[1];
          const tag = process.argv[2];
          const isDev = process.argv[3] === 'true';
          const isPrerelease = isDev || bump === 'prerelease';

          console.error('DEBUG: bump=' + bump + ', tag=' + tag + ', isDev=' + isDev + ', isPrerelease=' + isPrerelease);

          if (!isPrerelease) {
            const npmVer = execSync('npm view @wu529778790/open-im version 2>/dev/null || echo 0.0.0', { encoding: 'utf8', shell: '/bin/bash' }).trim();
            const next = semver.inc(npmVer, bump);
            console.log('VERSION=' + next);
            console.log('IS_PRERELEASE=false');
            console.log('PRERELEASE_TAG=');
            process.exit(0);
          }

          try {
            const versionsJson = execSync('npm view @wu529778790/open-im versions --json 2>/dev/null || echo []', { encoding: 'utf8', shell: '/bin/bash' });
            const versions = JSON.parse(versionsJson.trim() || '[]');
            const npmVer = versions.length > 0 ? versions.sort(semver.compare).pop() : '0.0.0';
            console.error('DEBUG: Latest npm version: ' + npmVer);

            let next;
            const prerelease = semver.prerelease(npmVer);

            if (!prerelease || prerelease.length === 0) {
              const base = semver.inc(npmVer, 'patch');
              next = base + '-' + tag + '.0';
            } else if (npmVer.indexOf('-' + tag + '.') >= 0) {
              next = semver.inc(npmVer, 'prerelease', tag);
            } else {
              const base = npmVer.split('-')[0];
              next = base + '-' + tag + '.0';
            }

            console.error('DEBUG: Next version: ' + next);
            console.log('VERSION=' + next);
            console.log('IS_PRERELEASE=true');
            console.log('PRERELEASE_TAG=' + tag);
          } catch (e) {
            console.error('ERROR: ' + e.message);
            console.error(e.stack);
            console.log('VERSION=1.0.0-' + tag + '.0');
            console.log('IS_PRERELEASE=true');
            console.log('PRERELEASE_TAG=' + tag);
          }
          NODEEOF

          # 执行脚本
          set +e
          OUTPUT=$(node bump-version.cjs "$BUMP" "$TAG" "$IS_DEV" 2>&1)
          RC=$?
          set -e

          echo "=== Script Output ==="
          echo "$OUTPUT"
          echo "=== Exit Code: $RC ==="

          if [ $RC -ne 0 ]; then
            echo "Script failed with exit code $RC"
            exit 1
          fi

          # 提取变量
          VERSION=$(echo "$OUTPUT" | grep '^VERSION=' | head -1 | cut -d'=' -f2-)
          IS_PRERELEASE=$(echo "$OUTPUT" | grep '^IS_PRERELEASE=' | head -1 | cut -d'=' -f2-)
          PRERELEASE_TAG=$(echo "$OUTPUT" | grep '^PRERELEASE_TAG=' | head -1 | cut -d'=' -f2-)

          echo "=== Extracted Values ==="
          echo "VERSION=$VERSION"
          echo "IS_PRERELEASE=$IS_PRERELEASE"
          echo "PRERELEASE_TAG=$PRERELEASE_TAG"

          if [ -z "$VERSION" ]; then
            echo "ERROR: VERSION not found in output!"
            exit 1
          fi

          npm pkg set version=$VERSION
          echo "IS_PRERELEASE=${IS_PRERELEASE:-false}" >> $GITHUB_ENV
          echo "PRERELEASE_TAG=${PRERELEASE_TAG:-beta}" >> $GITHUB_ENV

      - run: npm run build

      - run: npm test
        continue-on-error: true

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: |
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            npm publish --access public --tag=$PRERELEASE_TAG
          else
            npm publish --access public
          fi

      - name: Dry run (no publish)
        if: github.event.inputs.dry_run == 'true'
        run: npm pack
