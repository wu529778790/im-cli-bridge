name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump (manual trigger 时必须选，否则会报版本已存在)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (不发布，仅打包)'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Remove deprecated npm config
        run: npm config delete always-auth 2>/dev/null || true

      - run: npm ci

      - name: Bump version (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          NPM_VER=$(npm view @wu529778790/open-im version 2>/dev/null) || NPM_VER="0.0.0"
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          NEXT=$(npx -y semver@7 -i $BUMP $NPM_VER)
          npm version $NEXT --no-git-tag-version

      - run: npm run build

      - run: npm test
        continue-on-error: true

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public

      - name: Dry run (no publish)
        if: github.event.inputs.dry_run == 'true'
        run: npm pack
