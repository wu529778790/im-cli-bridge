name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (自动从 dev 分支发布 prerelease)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_tag:
        description: 'Prerelease tag (选择 prerelease 时生效)'
        required: false
        default: 'beta'
        type: choice
        options:
          - beta
          - rc
          - alpha
      dry_run:
        description: 'Dry run (不发布，仅打包)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm ci

      - name: Bump version (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          NPM_VER=$(npm view @wu529778790/open-im version 2>/dev/null) || NPM_VER="0.0.0"
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          TAG="${{ github.event.inputs.prerelease_tag || 'beta' }}"

          # dev 分支或选择 prerelease 时发布预览版
          if [[ "${{ github.ref_name }}" == "dev" ]] || [[ "$BUMP" == "prerelease" ]]; then
            NEXT=$(npx -y semver@7 -i prerelease --preid=$TAG $NPM_VER)
          else
            NEXT=$(npx -y semver@7 -i $BUMP $NPM_VER)
          fi

          # 直接修改 package.json，不使用 npm version（避免版本检查）
          npm pkg set version=$NEXT
          echo "Publishing version: $NEXT"

      - run: npm run build

      - run: npm test
        continue-on-error: true

      - name: Publish to npm
        if: github.event.inputs.dry_run != 'true'
        run: npm publish --access public

      - name: Dry run (no publish)
        if: github.event.inputs.dry_run == 'true'
        run: npm pack
