name: Build Standalone Binary

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            output: im-cli-bridge-linux
          - os: windows-latest
            platform: win
            arch: x64
            output: im-cli-bridge-win.exe
          - os: macos-latest
            platform: macos
            arch: x64
            output: im-cli-bridge-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Package with pkg
        run: |
          npx pkg . --targets node18-${{ matrix.platform }}-${{ matrix.arch }} --output ${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          retention-days: 30

      - name: Display file size
        shell: bash
        run: |
          ls -lh ${{ matrix.output }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            sha256sum * > ../"${dir%/}.sha256"
            cd ..
          done
          sha256sum *

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/im-cli-bridge-linux/*
            artifacts/im-cli-bridge-win.exe/*
            artifacts/im-cli-bridge-macos/*
            artifacts/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
